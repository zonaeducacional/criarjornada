<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A Forja">
<meta name="theme-color" content="#0a0a0a">
<title>A Forja do Limiar | Jornada do Herói</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
  --bg: #0a0a0c;
  --card-bg: rgba(255, 255, 255, 0.03);
  --card-border: rgba(255, 255, 255, 0.08);
  --accent: #d4af37;
  --accent-glow: rgba(212, 175, 55, 0.3);
  --text-main: #e0e0e0;
  --text-dim: #a0a0a0;
  --success: #10b981;
  --error: #ef4444;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
  --radius-lg: 20px;
  --radius-md: 12px;
  --font-serif: 'Cormorant Garamond', serif;
  --font-sans: 'Plus Jakarta Sans', sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
    radial-gradient(circle at 0% 100%, rgba(212, 175, 55, 0.02) 0%, transparent 40%);
  color: var(--text-main);
  font-family: var(--font-sans);
  height: 100vh;
  overflow: hidden;
  line-height: 1.6;
}

/* ── UTILS ── */
.glass {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
}

.animate-in {
  animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.screen.active {
  opacity: 1;
  pointer-events: all;
  z-index: 10;
}

/* ── HOME SCREEN ── */
#screen-home {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
}

.hero-visual {
  width: 120px;
  height: 120px;
  margin-bottom: 2rem;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-visual svg {
  width: 64px;
  height: 64px;
  color: var(--accent);
  filter: drop-shadow(0 0 15px var(--accent-glow));
  z-index: 2;
}

.hero-visual::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid var(--accent);
  border-radius: 50%;
  animation: pulse 3s infinite;
  opacity: 0.3;
}

@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0; }
  50% { opacity: 0.3; }
  100% { transform: scale(1.3); opacity: 0; }
}

.home-title {
  font-family: var(--font-serif);
  font-size: clamp(2.5rem, 10vw, 4rem);
  font-weight: 700;
  line-height: 1;
  margin-bottom: 1rem;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.home-subtitle {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 2rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.home-desc {
  max-width: 400px;
  color: var(--text-dim);
  margin-bottom: 3rem;
  font-weight: 300;
}

.btn-luxury {
  background: var(--accent);
  color: #000;
  padding: 1rem 2.5rem;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 0 0 var(--accent-glow);
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-luxury:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
}

.btn-luxury:active {
  transform: translateY(0);
}

/* ── GAME SCREEN ── */
#screen-game {
  background: var(--bg);
}

.topbar {
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--card-border);
  background: rgba(10, 10, 12, 0.8);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.topbar-info {
  display: flex;
  flex-direction: column;
}

.topbar-title {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--accent);
}

.topbar-status {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.score-badge {
  background: var(--card-bg);
  border: 1px solid var(--accent);
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
}

.game-layout {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 70px);
}

/* Cards Pool */
.pool-area {
  padding: 0.8rem 1rem;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid var(--card-border);
  min-height: 140px;
  display: flex;
  flex-direction: column;
}

.pool-header {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.pool-scroll {
  flex: 1;
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  scroll-snap-type: x mandatory;
}

.pool-scroll::-webkit-scrollbar { height: 4px; }
.pool-scroll::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

.story-card {
  flex: 0 0 200px;
  height: 100px;
  padding: 0.8rem;
  border-radius: var(--radius-md);
  font-size: 0.8rem;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  cursor: grab;
  transition: all 0.3s;
  user-select: none;
  scroll-snap-align: start;
}

.story-card.placed {
  opacity: 0.2;
  filter: grayscale(1);
  pointer-events: none;
}

.story-card:hover:not(.placed) {
  border-color: var(--accent);
  background: rgba(255,255,255,0.05);
}

/* Board Area */
.board-area {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 1.5rem 140px; /* Aumentado padding inferior para compensar botões fixos */
  display: flex;
  flex-direction: column;
  gap: 2rem;
  scroll-behavior: smooth;
}

.board-area::-webkit-scrollbar { width: 6px; }
.board-area::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

.stage-container {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.stage-head {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stage-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 600;
}

.stage-label {
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-dim);
}

.drop-zone {
  min-height: 80px;
  border-radius: var(--radius-md);
  border: 1px dashed var(--card-border);
  background: rgba(255,255,255,0.01);
  transition: all 0.3s;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 1rem;
}

.drop-zone.active {
  border-color: var(--accent);
  background: rgba(212, 175, 55, 0.05);
}

.drop-zone.filled {
  border-style: solid;
  border-color: var(--card-border);
  background: var(--card-bg);
}

.drop-zone.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
.drop-zone.wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.05); }

.drop-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 0.8rem;
  font-style: italic;
  opacity: 0.5;
}

.card-content {
  font-size: 0.9rem;
  line-height: 1.5;
}

.card-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 1rem;
}

.btn-remove {
  background: none;
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-remove:hover {
  background: var(--error);
  color: white;
  border-color: var(--error);
}

.hint-box {
  margin-top: 1rem;
  padding: 0.8rem;
  border-radius: 8px;
  background: rgba(239, 68, 68, 0.1);
  border-left: 3px solid var(--error);
  font-size: 0.8rem;
  color: #fca5a5;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── CONTROLS ── */
.game-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 80%, transparent);
  display: flex;
  gap: 1rem;
  z-index: 1000;
}

.btn-control {
  flex: 1;
  padding: 1rem;
  border-radius: 50px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-main);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.btn-control.primary {
  background: var(--accent);
  color: #000;
  border: none;
}

.btn-control:active { transform: scale(0.98); }

/* ── RESULT SCREEN ── */
#screen-result {
  padding: 2rem;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.result-card {
  max-width: 600px;
  width: 100%;
  padding: 2.5rem;
  border-radius: var(--radius-lg);
}

.result-icon {
  width: 80px;
  height: 80px;
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.5rem;
}

.result-title {
  font-family: var(--font-serif);
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

.result-text {
  color: var(--text-dim);
  margin-bottom: 2rem;
}

.story-full {
  max-height: 300px;
  overflow-y: auto;
  text-align: left;
  padding: 1.5rem;
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius-md);
  margin-bottom: 2rem;
  font-family: var(--font-serif);
  font-size: 1.1rem;
  line-height: 1.8;
}

.story-full p { margin-bottom: 1rem; }

/* ── RESPONSIVE ── */
@media (min-width: 768px) {
  .game-layout {
    flex-direction: row;
  }
  .pool-area {
    width: 320px;
    height: 100%;
    border-bottom: none;
    border-right: 1px solid var(--card-border);
  }
  .pool-scroll {
    flex-direction: column;
    overflow-x: hidden;
    overflow-y: auto;
  }
  .story-card {
    flex: 0 0 auto;
    width: 100%;
    height: auto;
  }
  .board-area {
    padding: 3rem;
  }
  .game-controls {
    left: 320px;
  }
}

/* Touch Ghost */
.touch-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 200px;
  padding: 10px;
  background: var(--accent);
  color: black;
  border-radius: 8px;
  opacity: 0.8;
  font-size: 0.8rem;
}
</style>
</head>
<body>

<!-- Pantalla de Inicio -->
<div id="screen-home" class="screen active">
  <div class="hero-visual">
    <i data-lucide="anvil"></i>
  </div>
  <h1 class="home-title">A Forja do Limiar</h1>
  <p class="home-subtitle">A Jornada do Herói</p>
  <p class="home-desc">Treze fragmentos de uma alma em transformação. Ordene as etapas da jornada para revelar a verdade oculta.</p>
  <button class="btn-luxury" onclick="startGame()">
    INICIAR JORNADA <i data-lucide="arrow-right"></i>
  </button>
</div>

<!-- Pantalla de Jogo -->
<div id="screen-game" class="screen">
  <header class="topbar">
    <div class="topbar-info">
      <span class="topbar-title">A Forja do Limiar</span>
      <span class="topbar-status">Ordenando a História</span>
    </div>
    <div class="score-badge" id="score-text">0 / 13</div>
    <button class="btn-remove" onclick="goToHome()" style="padding: 8px;"><i data-lucide="home"></i></button>
  </header>

  <div class="game-layout">
    <aside class="pool-area">
      <div class="pool-header">
        <i data-lucide="scroll-text" size="14"></i>
        Fragmentos Disponíveis
      </div>
      <div class="pool-scroll" id="pool">
        <!-- Cards injected here -->
      </div>
    </aside>

    <main class="board-area" id="board">
      <div id="stages-list">
        <!-- Stages injected here -->
      </div>
    </main>
  </div>

  <footer class="game-controls">
    <button class="btn-control" onclick="resetGame()">REINICIAR</button>
    <button class="btn-control primary" onclick="checkOrder()">VERIFICAR ORDEM</button>
  </footer>
</div>

<!-- Pantalla de Resultado -->
<div id="screen-result" class="screen">
  <div class="result-card glass">
    <div class="result-icon">
      <i data-lucide="sparkles" size="40"></i>
    </div>
    <h2 class="result-title">Jornada Completa</h2>
    <p class="result-text">Você dominou os treze passos da transformação.</p>
    
    <div class="story-full" id="full-story-text">
      <!-- Full story here -->
    </div>

    <div style="display: flex; gap: 1rem;">
      <button class="btn-control" onclick="copyStory()">COPIAR TEXTO</button>
      <button class="btn-control primary" onclick="resetGame()">JOGAR NOVAMENTE</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const STAGES = [
  { label:"Mundo comum", text:"Arion cresceu numa aldeia entre montanhas onde o tempo parecia parado. Os dias se repetiam como ecos: o mesmo mercado, os mesmos rostos, a mesma névoa descendo pelo vale ao entardecer. Ele consertava ferramentas e sonhava em silêncio, sem saber que o silêncio estava prestes a ser quebrado.", hint:"Este trecho mostra a vida do herói antes de qualquer perturbação." },
  { label:"Chamado à aventura", text:"Uma noite, um mensageiro chegou com uma carta lacrada em cera negra. Ela dizia que o Cristal do Limiar havia sido roubado, e apenas alguém de sangue das montanhas poderia recuperá-lo. O nome de Arion estava escrito no verso, com uma tinta que brilhava como brasa.", hint:"Algo externo rompe o equilíbrio da vida do herói." },
  { label:"Recusa do chamado", text:"Arion dobrou a carta e a enfiou debaixo de uma tábua solta. Quem era ele para salvar qualquer coisa? Tinha mãos calejadas de ferreiro, não de herói. Passou três dias ignorando os sonhos que invadiam seu sono — sonhos de cidades em chamas e de uma voz que repetia seu nome como uma maré.", hint:"O herói recebe o chamado mas hesita." },
  { label:"Encontro com o mentor", text:"A velha Sura apareceu na forja ao amanhecer do quarto dia. Ela conhecia o pai de Arion e o segredo que ele carregava. Sentou-se na bigorna como se fosse um trono e disse: 'O medo não vai embora quando você age. Ele só muda de lugar.' Então entregou-lhe uma bússola sem agulha e foi embora sem despedida.", hint:"Uma figura sábia aparece com orientação." },
  { label:"Travessia do limiar", text:"Na manhã seguinte, Arion amarrou as botas, colocou a bússola no bolso e caminhou até a borda da aldeia. A névoa do vale o esperava como uma cortina. Ele respirou fundo, deu um passo além da pedra que marcava os limites do lugar que conhecia, e desapareceu na manhã cinzenta.", hint:"O herói finalmente cruza a fronteira para o desconhecido." },
  { label:"Testes, aliados e inimigos", text:"O caminho trouxe provações e companheiros improváveis: Lira, uma arqueira exilada que não confiava em ninguém; Brek, um anão cartógrafo que conhecia cada atalho e cada armadilha da região. Juntos, enfrentaram guardas corrompidos, tempestades de areia e a traição de um guia contratado na cidade de Maren.", hint:"O herói enfrenta obstáculos menores e constrói relações." },
  { label:"Aproximação da caverna", text:"A Fortaleza de Cinza erguia-se no centro de uma planície sem sombra. Arion e seus companheiros acamparam a meia légua de distância, estudando as muralhas por dois dias. Lira contou as sentinelas. Brek desenhou a planta do interior. Arion não dormiu — sabia que o que havia lá dentro era diferente de tudo que haviam enfrentado.", hint:"O herói chega perto do perigo máximo." },
  { label:"Provação suprema", text:"No interior da fortaleza, Arion foi separado dos companheiros e preso numa câmara espelhada. Cada reflexo mostrava uma versão diferente de si: o covarde que ficou na aldeia, o herói que falhou, o homem que nunca existiu. Para sair, precisou escolher qual deles era real — e descobriu que todos eram, ao mesmo tempo.", hint:"O herói enfrenta sua maior crise interna." },
  { label:"Recompensa", text:"O Cristal do Limiar estava numa sala sem portas, flutuando sobre um pedestal de obsidiana. Quando Arion o tocou, sentiu a memória de cada pessoa que o havia carregado antes. Entendeu que o cristal não era um objeto de poder, mas um espelho de intenção — e que ele estava pronto para carregá-lo.", hint:"Após sobreviver ao pior, o herói conquista o que buscava." },
  { label:"Caminho de volta", text:"A fuga foi caótica. Lira abriu caminho com suas flechas enquanto Brek guiava pelo labirinto de corredores. Arion carregava o cristal contra o peito, sentindo seu calor pulsar como um segundo coração. Saíram pela entrada dos fundos no momento em que a fortaleza começava a desmoronar.", hint:"Com o objetivo conquistado, o herói precisa retornar." },
  { label:"Ressurreição", text:"A uma hora de distância, o general corrupto os interceptou com vinte cavaleiros. Lira foi atingida. Brek ficou para trás para abrir tempo. Arion chegou a um desfiladeiro sem saída. O cristal respondeu — não com magia, mas com clareza. Quando os cavaleiros chegaram à beira do abismo, encontraram apenas o eco de uma escolha.", hint:"Uma última ameaça coloca tudo em risco novamente." },
  { label:"Retorno com o elixir", text:"Arion chegou à Câmara dos Guardiões sozinho, com o cristal e com cicatrizes que não existiam antes. Devolveu o objeto ao seu lugar com mãos que não tremeram. Os guardiões perguntaram o que havia aprendido. Ele respondeu: 'Que o equilíbrio não é ausência de caos. É o que escolhemos fazer dentro dele.'", hint:"O herói completa a missão e entrega o que trouxe." },
  { label:"Novo mundo comum", text:"A aldeia entre as montanhas parecia menor quando ele voltou — mas não de forma ruim. Menor, como uma roupa que ainda serve mas que já não define o tamanho de quem a veste. Arion retomou a forja, e as pessoas perceberam algo diferente nele: não uma aura de herói, mas a presença de quem já esteve no fundo e escolheu subir.", hint:"O herói voltou transformado ao ponto de partida." }
];

// ── STATE ──
let slots = Array(13).fill(null);
let shuffledIds = [];
let dragId = null;
let validated = false;

// ── LOGIC ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  switchScreen('screen-game');
  init();
}

function goToHome() {
  switchScreen('screen-home');
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function init() {
  slots = Array(13).fill(null);
  shuffledIds = shuffle(STAGES.map((_, i) => i));
  validated = false;
  render();
}

function render() {
  renderPool();
  renderBoard();
  updateScore();
  lucide.createIcons();
}

function renderPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  shuffledIds.forEach(id => {
    const isUsed = slots.includes(id);
    const card = document.createElement('div');
    card.className = `story-card glass ${isUsed ? 'placed' : ''}`;
    card.draggable = !isUsed;
    card.innerHTML = STAGES[id].text;
    
    card.addEventListener('dragstart', (e) => {
      dragId = id;
      e.dataTransfer.setData('text/plain', id);
    });

    // Touch support
    card.addEventListener('touchstart', (e) => {
      if(isUsed) return;
      handleTouchStart(e, id);
    }, {passive: false});

    pool.appendChild(card);
  });
}

function renderBoard() {
  const board = document.getElementById('stages-list');
  board.innerHTML = '';
  STAGES.forEach((s, i) => {
    const isFilled = slots[i] !== null;
    const isCorrect = isFilled && slots[i] === i;
    const showHint = validated && isFilled && !isCorrect;

    const container = document.createElement('div');
    container.className = 'stage-container animate-in';
    container.style.animationDelay = `${i * 0.05}s`;

    container.innerHTML = `
      <div class="stage-head">
        <div class="stage-num">${i + 1}</div>
        <div class="stage-label">${s.label}</div>
      </div>
      <div class="drop-zone ${isFilled ? 'filled' : ''} ${validated && isFilled ? (isCorrect ? 'correct' : 'wrong') : ''}" 
           data-index="${i}"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event, ${i})">
        ${!isFilled ? '<div class="drop-placeholder">Arraste um fragmento aqui</div>' : `
          <div class="card-content">${STAGES[slots[i]].text}</div>
          <div class="card-actions">
            <button class="btn-remove" onclick="removeCard(${i})">REMOVER</button>
          </div>
        `}
      </div>
      ${showHint ? `<div class="hint-box">${s.hint}</div>` : ''}
    `;
    board.appendChild(container);
  });
}

function updateScore() {
  const correctCount = slots.filter((id, i) => id === i).length;
  document.getElementById('score-text').textContent = `${correctCount} / 13`;
}

// ── DRAG & DROP ──
function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('active');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('active');
}

function handleDrop(e, index) {
  e.preventDefault();
  e.currentTarget.classList.remove('active');
  const id = parseInt(e.dataTransfer.getData('text/plain'));
  placeCard(id, index);
}

function placeCard(id, index) {
  // If card was already in another slot, clear it
  const existingSlot = slots.indexOf(id);
  if (existingSlot !== -1) slots[existingSlot] = null;

  slots[index] = id;
  validated = false;
  render();

  // Scroll suave para o slot preenchido (melhor UX no mobile)
  setTimeout(() => {
    const slotEl = document.querySelector(`.drop-zone[data-index="${index}"]`);
    if (slotEl) {
      slotEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

function removeCard(index) {
  slots[index] = null;
  validated = false;
  render();
}

function checkOrder() {
  validated = true;
  render();
  
  const allCorrect = slots.every((id, i) => id === i);
  if (allCorrect) {
    showResult();
  }
}

function resetGame() {
  if(confirm("Reiniciar jornada? Todo o progresso será perdido.")) {
    init();
    switchScreen('screen-game');
  }
}

function showResult() {
  const storyText = STAGES.map(s => `<p>${s.text}</p>`).join('');
  document.getElementById('full-story-text').innerHTML = storyText;
  
  setTimeout(() => {
    switchScreen('screen-result');
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 },
      colors: ['#d4af37', '#ffffff', '#aa8a2e']
    });
  }, 500);
}

function copyStory() {
  const text = STAGES.map(s => s.text).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    alert("História copiada para a área de transferência!");
  });
}

// ── TOUCH LOGIC (SIMPLIFIED) ──
let touchGhost = null;
let currentTouchId = null;

function handleTouchStart(e, id) {
  e.preventDefault();
  currentTouchId = id;
  const touch = e.touches[0];
  
  touchGhost = document.createElement('div');
  touchGhost.className = 'touch-ghost';
  touchGhost.textContent = STAGES[id].text.substring(0, 50) + '...';
  document.body.appendChild(touchGhost);
  moveGhost(touch.pageX, touch.pageY);

  const onTouchMove = (e) => {
    const t = e.touches[0];
    moveGhost(t.pageX, t.pageY);
  };

  const onTouchEnd = (e) => {
    const t = e.changedTouches[0];
    const dropTarget = document.elementFromPoint(t.clientX, t.clientY)?.closest('.drop-zone');
    
    if (dropTarget) {
      const index = parseInt(dropTarget.dataset.index);
      placeCard(currentTouchId, index);
    }

    if (touchGhost) touchGhost.remove();
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
  };

  document.addEventListener('touchmove', onTouchMove, {passive: false});
  document.addEventListener('touchend', onTouchEnd);
}

function moveGhost(x, y) {
  if (touchGhost) {
    touchGhost.style.left = `${x - 100}px`;
    touchGhost.style.top = `${y - 40}px`;
  }
}

// ── PWA SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW registrado!', reg);
    }).catch(err => {
      console.log('SW falhou!', err);
    });
  });
}

lucide.createIcons();
</script>
